name: Build Matter Edge AI samples on pr
on: 
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ncs-matter-edge-ai-samples-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  CCACHE_SLOPPINESS: file_macro,time_macros,include_file_mtime,include_file_ctime
  WEST_PATH_CACHE: ${{ github.workspace }}/west-path-cache

jobs:
  Build-samples:
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.4.0
    defaults:
      run:
        # Bash shell is needed to set toolchain related environment variables in docker container
        # It is a workaround for GitHub Actions limitation https://github.com/actions/runner/issues/1964
        shell: bash
    steps: 
    - name: Checkout repository code
      uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4
      with:
        fetch-depth: 0
        path: ncs-matter-edge-ai

    - name: Restore west module path cache
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: west-path-cache
        key: west-path-cache-${{ hashFiles('ncs-matter-edge-ai/west.yml') }}
        restore-keys: |
          west-path-cache-

    - name: Restore ccache
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: .ccache
        key: ccache-ncs-matter-edge-ai-${{ hashFiles('ncs-matter-edge-ai/west.yml') }}-${{ github.base_ref }}
        restore-keys: |
          ccache-ncs-matter-edge-ai-${{ hashFiles('ncs-matter-edge-ai/west.yml') }}-
          ccache-ncs-matter-edge-ai-

    - name: Restore pip cache
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: ~/.cache/pip
        key: pip-ncs-matter-edge-ai-${{ hashFiles('ncs-matter-edge-ai/west.yml') }}

    - name: prepare west project
      run: |
        rm -rf .west
        west --version
        west init -l ncs-matter-edge-ai --mf west.yml
        west update -n -o=--depth=1 --path-cache "${WEST_PATH_CACHE}"

    - name: prepare west project
      run: |
        rm -rf .west
        west --version
        west init -l ncs-matter-edge-ai --mf west.yml &&
        west update -n -o=--depth=1 --path-cache /workdir/

    - name: Install Python deps for Matter (codegen + factory data)
      run: |
        pip3 install -r nrf/scripts/requirements-extra.txt
        pip3 install -r modules/lib/matter/scripts/setup/requirements.nrfconnect.txt

    - name: Set up ccache
      run: |
        mkdir -p "${CCACHE_DIR}"
        ccache -z
        ccache -s

    - name: Twister build samples
      run: |
        source zephyr/zephyr-env.sh
        zephyr/scripts/twister --inline-logs --build-only -N --verbose -T ncs-matter-edge-ai/samples --all

    - name: Store hex files
      uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392 # v4
      with:
        name: hexes
        path: twister-out/**/*.hex
